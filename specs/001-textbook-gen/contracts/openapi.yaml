openapi: 3.0.3
info:
  title: Agentic AI in DevOps Textbook API
  version: 1.0.0
  description: API for interactive textbook with RAG chatbot, auth, and quizzes

servers:
  - url: https://{backend}.railway.app
    description: Production Railway backend
  - url: http://localhost:8000
    description: Local development

paths:
  /api/chapters:
    get:
      summary: List all chapters
      tags: [Chapters]
      responses:
        '200':
          description: List of chapters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChapterSummary'

  /api/chapters/{slug}:
    get:
      summary: Get chapter content
      tags: [Chapters]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
        - name: background
          in: query
          schema:
            type: string
            enum: [beginner, engineer, architect, manager]
          description: Content variant (defaults to engineer)
      responses:
        '200':
          description: Chapter content
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'
        '404':
          description: Chapter not found

  /api/chat:
    post:
      summary: Send chat question
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  description: User's question
      responses:
        '200':
          description: Chat response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '400':
          description: Invalid request

  /api/auth/signup:
    post:
      summary: Create new account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: Account created
        '400':
          description: Email already exists

  /api/auth/login:
    post:
      summary: Login to account
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials

  /api/user/profile:
    get:
      summary: Get user profile
      tags: [User]
      security:
        - CookieAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Not authenticated

    put:
      summary: Update user profile
      tags: [User]
      security:
        - CookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                background:
                  type: string
                  enum: [beginner, engineer, architect, manager]
      responses:
        '200':
          description: Profile updated
        '401':
          description: Not authenticated

  /api/quiz/{chapterSlug}:
    get:
      summary: Get quiz for chapter
      tags: [Quiz]
      parameters:
        - name: chapterSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Quiz data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quiz'
        '404':
          description: Quiz not found

    post:
      summary: Submit quiz answers
      tags: [Quiz]
      security:
        - CookieAuth: []
      parameters:
        - name: chapterSlug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  items:
                    type: object
                    properties:
                      questionId:
                        type: string
                      selectedIndex:
                        type: integer
      responses:
        '200':
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResult'

  /api/quiz/results:
    get:
      summary: Get user's quiz results
      tags: [Quiz]
      security:
        - CookieAuth: []
      responses:
        '200':
          description: List of quiz results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResultSummary'

  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: Service healthy

components:
  securitySchemes:
    CookieAuth:
      type: apiKey
      in: cookie
      name: auth_token

  schemas:
    ChapterSummary:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        order:
          type: integer
        readingTime:
          type: integer

    Chapter:
      type: object
      properties:
        slug:
          type: string
        title:
          type: string
        order:
          type: integer
        readingTime:
          type: integer
        summary:
          type: array
          items:
            type: string
        body:
          type: string
        tags:
          type: array
          items:
            type: string

    ChatResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              chapterSlug:
                type: string
              sectionTitle:
                type: string
              chunkText:
                type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        background:
          type: string

    Quiz:
      type: object
      properties:
        chapterSlug:
          type: string
        questions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              question:
                type: string
              options:
                type: array
                items:
                  type: string
        reflectionPrompt:
          type: string

    QuizResult:
      type: object
      properties:
        score:
          type: integer
        total:
          type: integer
        answers:
          type: array
          items:
            type: object
            properties:
              questionId:
                type: string
              correct:
                type: boolean

    QuizResultSummary:
      type: object
      properties:
        chapterSlug:
          type: string
        score:
          type: integer
        completedAt:
          type: string
          format: date-time